name: ci
on:
  push:
    branches: [ main ]
    paths:
      - 'tools/silo-kb/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'tools/silo-kb/**'
      - '.github/workflows/ci.yml'

jobs:
  silo-kb:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/silo-kb
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/silo-kb/go.mod
          cache-dependency-path: tools/silo-kb/go.sum

      - name: build
        run: go build -o silo-kb .

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...
