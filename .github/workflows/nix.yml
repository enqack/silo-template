name: nix
on:
  push:
    branches: [ main ]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/nix.yml'
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/nix.yml'

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: flake check
        run: nix flake check -L

      - name: dev shell realizes
        env:
          SILOKB_NO_AUTOSTART: "1"
        run: nix develop --command bash -c 'go version && psql --version'
